<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuicyCore | Project Zero</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.07) 0%, transparent 70%);
            z-index: 0;
        }

        /* Tekstura ziarna */
        .background-glow::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .container {
            text-align: center;
            z-index: 1;
            opacity: 0;
            animation: fadeIn 3s forwards ease-in-out;
            padding: 20px;
        }

        /* OKRĄG Z SERCEM */
        .logo-wrapper {
            margin-bottom: 40px;
        }

        .logo-ring {
            width: 160px; /* Rozmiar dopasowany do detali serca */
            height: 160px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            animation: pulse 4s infinite ease-in-out;
            overflow: hidden;
            background-color: black;
        }

        .logo-ring img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Wypełnia okrąg bez zniekształceń */
            display: block;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            letter-spacing: 15px;
            color: var(--gold);
            margin: 10px 0;
            text-transform: uppercase;
            font-weight: 700;
        }

        .manifesto {
            font-size: 0.85rem;
            letter-spacing: 5px;
            color: #888;
            text-transform: uppercase;
            margin: 30px auto 60px auto;
            font-weight: 300;
            max-width: 700px;
            line-height: 2;
        }

        p.status {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: #444;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .nexus-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nexus-links a {
            color: var(--gold);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.5;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            padding: 10px 20px;
            text-transform: uppercase;
        }

        .nexus-links a:hover {
            opacity: 1;
            border: 1px solid var(--gold);
            background: rgba(212, 175, 55, 0.05);
            letter-spacing: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(212, 175, 55, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="container">
        <div class="logo-wrapper">
            <div class="logo-ring">
                <img src="heart1.png" alt="JuicyCore Neural Heart">
            </div>
        </div>
        
        <h1>JuicyCore</h1>
        
        <p class="manifesto">In a world of noise, silence is the ultimate form of technology.</p>
        
        <p class="status">System Initializing // Project Zero</p>

        <nav class="nexus-links">
            <a href="https://github.com/JuicyCore" target="_blank">GitHub</a>
            <a href="https://x.com/JuicyCoreHQ" target="_blank">X.com</a>
            <a href="https://discord.gg/E6Cp7rvpWP" target="_blank">Discord</a>
            <a href="https://juicycore.ai" target="_blank">The Lab</a>
        </nav>
    </div>
</body>
</html>
